<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header>
    <div class="header-left">
        <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
        </div>
        <div>
            <h1>Proxy Manager</h1>
            <p class="subtitle">Manage reverse proxies on your server</p>
        </div>
    </div>

    <div class="header-right">
        <div class="stats">
            <div class="stat-card stat-ip" id="ipCard" onclick="toggleOverride()">
                <div class="stat-value" id="myIp">-</div>
                <div class="stat-label">Server IP</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="count">0</div>
                <div class="stat-label">Proxies</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledCount">0</div>
                <div class="stat-label">Enabled</div>
            </div>
        </div>

    </div>
</header>

<section class="panel">

    <div class="panel-header">
        <h2>Configured Proxies</h2>
    <div class="panel-actions">
        <button onclick="refresh()" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Refresh
        </button>
        <button onclick="openAddModal()">Add Proxy</button>
        <button class="secondary" onclick="exportConfig()">Export</button>
        <button class="secondary" onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importConfig(event)">
    </div>
    </div>

    <div class="proxy-grid" id="proxyGrid"></div>

</section>

</div>

<button class="fab" id="fab" onclick="openAddModal()" title="Add Proxy">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="formModal" style="display:none">
    <div class="modal" id="formModalContent">
        <div class="modal-header">
            <h2 id="formModalTitle">Add Proxy</h2>
            <button class="modal-close" onclick="closeModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label>Name <span class="optional">(optional)</span></label>
                <input id="modalName" placeholder="My Proxy" autofocus>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Port</label>
                    <input id="modalPort" type="number" placeholder="8080" min="1" max="65535" class="">
                    <span class="form-msg" id="modalPortMsg"></span>
                </div>

                <div class="form-group">
                    <label>Protocol</label>
                    <div class="protocol-toggle">
                        <button class="proto-btn active http" id="protoHttp" onclick="setProtocol('http')">HTTP</button>
                        <button class="proto-btn" id="protoHttps" onclick="setProtocol('https')">HTTPS</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Domain</label>
                <input id="modalDomain" placeholder="example.com" class="">
                <span class="form-msg" id="modalDomainMsg"></span>
            </div>

            <input type="hidden" id="modalOriginalPort" value="">
        </div>

        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeModal()" id="modalCancelBtn">Cancel</button>
            <button class="btn-primary" onclick="submitModal()" id="modalSubmitBtn">
                Add Proxy
            </button>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal" style="display:none">
    <div class="modal modal-sm" id="deleteModalContent">
        <div class="modal-header">
            <h2>Delete Proxy</h2>
        </div>
        <div class="modal-body">
            <div class="delete-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <p class="delete-text">Are you sure you want to delete the proxy on port <strong id="deletePort">0</strong>?</p>
            <p class="delete-hint">This action cannot be undone.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- Override IP Modal -->
<div class="modal-overlay" id="overrideModal" style="display:none">
    <div class="modal modal-sm" id="overrideModalContent">
        <div class="modal-header">
            <h2>Override Server IP</h2>
            <button class="modal-close" onclick="closeOverrideModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Override IP Address</label>
                <input id="overrideIPModal" placeholder="e.g., 192.168.1.100 (leave empty for auto)">
                <small style="color: var(--text-muted); font-size: 12px; margin-top: 6px; display: block;">Leave empty to use the detected server IP automatically</small>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-ghost" onclick="closeOverrideModal()">Cancel</button>
            <button class="btn-primary" onclick="saveOverrideIPFromModal()">Save</button>
        </div>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/components/ProxyCard.js"></script>
<script src="js/components/FormModal.js"></script>
<script src="js/components/DeleteModal.js"></script>
<script src="js/app.js"></script>

</body>
</html>
